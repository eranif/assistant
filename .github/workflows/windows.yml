name: msys2

on:
  workflow_dispatch:
  push:
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/msys2.yml'
  pull_request:
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/msys2.yml'

jobs:
  msys2:
    runs-on: ${{matrix.arch.runs-on}}

    strategy:
      fail-fast: false
      matrix:
        options: ['', '-DASSISTANTLIB_WITH_OPENSSL=OFF']
        arch:
          - msystem: clang64
            runs-on: windows-latest

    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{matrix.arch.msystem}}
        update: true
        pacboy: >-
          cmake:p
          make:p
          clang:p
          clang-tools-extra:p
          openssl:p

    - name: Checkout assistant
      uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: cmake --version
      shell: msys2 {0}
      run: cmake --version

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir build-release
        cd build-release
        cmake .. -G"MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON ${{ matrix.options }}
        cmake --build . --config Release --parallel $(nproc)

    - name: Run Tests
      shell: msys2 {0}
      run: |
        cd build-release
        ctest --output-on-failure
